name: Run Notion-Discord SMO-CAMT Bot

on:
  workflow_dispatch:
  schedule:
    # Re-run every 6 hours. Each run keeps the bot alive for ~5h50m.
    - cron: "0 */6 * * *"

permissions:
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: notion-discord-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Restore bot state cache
        id: restore-state
        uses: actions/cache/restore@v4
        with:
          path: state_tracker.json
          key: bot-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            bot-state-${{ github.ref_name }}-

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_CHANNEL_IDS: ${{ secrets.DISCORD_CHANNEL_IDS }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          set -e

          if [ -z "$DISCORD_TOKEN" ]; then
            echo "Missing required secret: DISCORD_TOKEN"
            exit 1
          fi

          if [ -z "$NOTION_API_KEY" ]; then
            echo "Missing required secret: NOTION_API_KEY"
            exit 1
          fi

          if [ -z "$NOTION_DATABASE_ID" ]; then
            echo "Missing required secret: NOTION_DATABASE_ID"
            exit 1
          fi

          if [ -z "$DISCORD_CHANNEL_ID" ] && [ -z "$DISCORD_CHANNEL_IDS" ]; then
            echo "Missing channel secret: set DISCORD_CHANNEL_ID or DISCORD_CHANNEL_IDS"
            exit 1
          fi

          # Fail early with actionable messages before the bot process starts.
          if [[ "$DISCORD_CHANNEL_ID" == *"your_"* ]] || [[ "$DISCORD_CHANNEL_ID" == *"_here"* ]]; then
            echo "DISCORD_CHANNEL_ID looks like a placeholder value"
            exit 1
          fi

          if [ -n "$DISCORD_CHANNEL_ID" ] && ! [[ "$DISCORD_CHANNEL_ID" =~ ^[0-9]+$ ]]; then
            echo "DISCORD_CHANNEL_ID must be numeric (Discord snowflake), not channel mention text"
            exit 1
          fi

          if [ -n "$DISCORD_CHANNEL_IDS" ]; then
            CLEAN_IDS="${DISCORD_CHANNEL_IDS// /}"
            if ! [[ "$CLEAN_IDS" =~ ^[0-9]+(,[0-9]+)*$ ]]; then
              echo "DISCORD_CHANNEL_IDS must be comma-separated numeric IDs"
              exit 1
            fi
          fi

      - name: Run bot (5h50m window)
        id: bot_process
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_CHANNEL_IDS: ${{ secrets.DISCORD_CHANNEL_IDS }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TRACKED_ORGANIZATION: ${{ secrets.TRACKED_ORGANIZATION }}
          POLL_INTERVAL: ${{ secrets.POLL_INTERVAL }}
        shell: bash
        run: |
          if [ ! -f state_tracker.json ]; then
            echo '{}' > state_tracker.json
          fi

          set +e
          set -o pipefail
          timeout --signal=SIGTERM 5h50m npm start 2>&1 | tee bot.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          # timeout exits with 124; treat it as expected so next schedule can continue.
          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 124 ]; then
            echo "Bot exited unexpectedly with code $EXIT_CODE"
            echo "Last 80 log lines:"
            tail -n 80 bot.log || true
            exit "$EXIT_CODE"
          fi

      - name: Trigger next bot run
        if: ${{ always() && steps.bot_process.outputs.exit_code == '124' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'bot.yml',
              ref: context.ref.replace('refs/heads/', ''),
            });

      - name: Upload bot log artifact
        if: ${{ always() && hashFiles('bot.log') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: bot-log-${{ github.run_id }}
          path: bot.log
          if-no-files-found: ignore

      - name: Save bot state cache
        if: ${{ always() && hashFiles('state_tracker.json') != '' }}
        uses: actions/cache/save@v4
        with:
          path: state_tracker.json
          key: bot-state-${{ github.ref_name }}-${{ github.run_id }}
